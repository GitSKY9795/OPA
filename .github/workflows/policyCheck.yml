name: OPA Policy Check

on:
  push:
    branches:
      - main

jobs:
  policy-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Conftest
        run: |
          VERSION=0.68.2
          ARCH=$(arch)
          SYSTEM=$(uname)
          curl -L -o conftest.tar.gz "https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/conftest_${VERSION}_${SYSTEM}_${ARCH}.tar.gz"
          tar xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest

      - name: Run OPA Policy Check
        run: conftest test config.json --policy policy/